<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ruxi — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #fbf6ec;
    --bg-2:     #f5eddb;
    --card:     #ffffff;
    --card-2:   #fdf9f0;
    --fg:       #1f1710;
    --fg-2:     #3e332a;
    --muted:    #6b5c4a;
    --accent:   #c8562a;
    --accent-2: #d4941f;
    --accent-3: #b8586e;
    --border:   #efe4cf;
    --border-2: #e2d5ba;
    --ok:       #4f8a3e;
    --warn:     #cf8416;
    --danger:   #bc4733;
    --shadow:   0 10px 28px -14px rgba(120,80,30,.28), 0 2px 6px -2px rgba(120,80,30,.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 15% 0%, rgba(232,146,45,.22), transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 15%, rgba(212,148,31,.14), transparent 60%),
      radial-gradient(ellipse 50% 30% at 50% 100%, rgba(200,86,42,.10), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 80px 22px 120px; position: relative; z-index: 1; }

  header { margin-bottom: 60px; }
  header .hello {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(200,86,42,.10);
    border: 1px solid rgba(200,86,42,.28);
    font-size: 12px; font-weight: 500; letter-spacing: .06em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 20px;
  }
  header .hello .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(200,86,42,.5); }
  header h1 {
    margin: 0 0 12px;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 72px; line-height: 1; font-weight: 400;
    letter-spacing: -.02em;
    color: var(--fg);
  }
  header h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .tag {
    font-size: 17px; color: var(--fg-2); max-width: 560px; line-height: 1.55;
    margin-bottom: 24px;
  }
  header .links {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  header .links a {
    font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--border-2);
    color: var(--fg-2); text-decoration: none;
    transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px;
    box-shadow: 0 1px 2px rgba(120,80,30,.06);
  }
  header .links a:hover { border-color: var(--accent); color: var(--fg); transform: translateY(-1px); }
  header .links a svg { width: 14px; height: 14px; }

  /* Category nav */
  .cat-nav {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px;
  }
  .cat-nav-btn {
    font-size: 13px; font-weight: 500;
    padding: 9px 16px; border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--border-2);
    color: var(--fg-2);
    cursor: pointer; user-select: none;
    transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .cat-nav-btn:hover { border-color: var(--accent); color: var(--fg); transform: translateY(-1px); }
  .cat-nav-btn.on {
    background: linear-gradient(135deg, var(--accent), #a3431f);
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 14px -6px rgba(200,86,42,.5);
  }
  .cat-nav-btn .cat-icon { font-size: 15px; line-height: 1; }
  .cat-nav-btn .n { font-size: 11px; opacity: .7; margin-left: 2px; }

  /* Category sections */
  .cat-section { margin-bottom: 48px; }
  .cat-section:last-child { margin-bottom: 0; }

  .cat-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .cat-header .cat-emoji {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .cat-header .cat-emoji.life     { background: rgba(79,138,62,.12); }
  .cat-header .cat-emoji.career   { background: rgba(200,86,42,.12); }
  .cat-header .cat-emoji.research { background: rgba(88,110,184,.12); }
  .cat-header .cat-emoji.tools    { background: rgba(212,148,31,.12); }
  .cat-header .cat-emoji.hobby    { background: rgba(184,88,110,.12); }

  .cat-header .cat-info h2 {
    margin: 0; font-size: 18px; font-weight: 600;
    font-family: "Instrument Serif", Georgia, serif;
    font-weight: 400; letter-spacing: -.01em;
  }
  .cat-header .cat-info .cat-desc {
    font-size: 13px; color: var(--muted); margin-top: 2px;
  }
  .cat-header .cat-count {
    margin-left: auto;
    font-size: 12px; color: var(--muted);
    font-family: "JetBrains Mono", monospace;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
  }

  .pcard {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    transition: all .15s ease;
    display: flex; flex-direction: column;
    min-height: 220px;
  }
  .pcard:hover {
    border-color: var(--border-2);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .pcard .status {
    position: absolute; top: 18px; right: 18px;
    font-size: 10px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .08em;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .pcard .status::before { content: ""; width: 5px; height: 5px; border-radius: 50%; }
  .pcard .status.live       { background: rgba(79,138,62,.12); color: var(--ok); border: 1px solid rgba(79,138,62,.35); }
  .pcard .status.live::before       { background: var(--ok); box-shadow: 0 0 6px rgba(79,138,62,.6); }
  .pcard .status.building   { background: rgba(212,148,31,.14); color: #a8720c; border: 1px solid rgba(212,148,31,.4); }
  .pcard .status.building::before   { background: var(--accent-2); box-shadow: 0 0 6px rgba(212,148,31,.6); }
  .pcard .status.idea       { background: rgba(184,88,110,.12); color: var(--accent-3); border: 1px solid rgba(184,88,110,.35); }
  .pcard .status.idea::before       { background: var(--accent-3); }
  .pcard .status.paused     { background: rgba(207,132,22,.14); color: var(--warn); border: 1px solid rgba(207,132,22,.35); }
  .pcard .status.paused::before     { background: var(--warn); }
  .pcard .status.archived   { background: rgba(141,128,112,.12); color: var(--muted); border: 1px solid var(--border-2); }
  .pcard .status.archived::before   { background: var(--muted); }

  .pcard h3 {
    margin: 0 0 8px; font-size: 20px; font-weight: 600;
    padding-right: 90px;
    font-family: "Instrument Serif", Georgia, serif; font-weight: 400;
    letter-spacing: -.005em;
  }
  .pcard h3 a {
    color: var(--fg); text-decoration: none;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 0 1px;
    transition: background-size .2s ease, color .15s ease;
    padding-bottom: 2px;
  }
  .pcard h3 a:hover { background-size: 100% 1px; color: var(--accent); }
  .pcard .desc {
    font-size: 14px; line-height: 1.55; color: var(--fg-2);
    margin: 0 0 16px;
  }
  .pcard .stack {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .pcard .stack span {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 5px;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    color: var(--fg-2);
  }
  .pcard .next {
    margin: 0 0 16px; padding: 12px 14px;
    background: rgba(212,148,31,.08);
    border: 1px solid rgba(212,148,31,.28);
    border-radius: 10px;
    font-size: 13px; line-height: 1.5; color: var(--fg-2);
  }
  .pcard .next::before {
    content: "NEXT"; display: block;
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    color: #a8720c; margin-bottom: 4px;
  }
  .pcard .foot {
    margin-top: auto; padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
  }
  .pcard .foot .updated {
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
  }
  .pcard .foot .visit {
    color: var(--accent); text-decoration: none; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .pcard .foot .visit:hover { color: var(--accent-2); }
  .pcard .foot .visit svg { width: 12px; height: 12px; }

  footer {
    margin-top: 60px; padding-top: 30px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); text-align: center;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 48px; }
    .wrap { padding: 50px 16px 80px; }
    .grid { grid-template-columns: 1fr; }
    .pcard { min-height: auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hello"><span class="dot"></span> Building things</div>
    <h1>Hi, I'm <em>Ruxi</em>.<br/>Here's what I'm building.</h1>
    <p class="tag">A running log of side projects — what's live, what's next, and what's on the shelf. Updated as I ship.</p>
    <div class="links" id="links"></div>
  </header>

  <div class="cat-nav" id="catNav"></div>
  <div id="sections"></div>

  <footer>
    Last updated <span id="lastUpdated"></span> · Built with HTML and a coffee.
  </footer>
</div>

<script>
// ============================================================
// EDIT BELOW TO ADD / UPDATE PROJECTS
// ============================================================

const ME = {
  name: "Ruxi",
  tagline: "A running log of side projects — what's live, what's next, and what's on the shelf. Updated as I ship.",
  links: [
    {label: "GitHub",   url: "https://github.com/ruxiz2020",   icon: "github"},
    {label: "Blog",     url: "https://medium.com/@ruxiz2005",  icon: "book"},
    {label: "Email",    url: "mailto:ruxiz2005@gmail.com",     icon: "mail"},
  ],
};

// category options: life · career · research · tools · hobby
// status options:   live · building · idea · paused · archived
const PROJECTS = [
  {
    name: "AI Life Tracker",
    url: "https://ailifetracker.app",
    category: "life",
    status: "building",
    description: "Voice-first life logging app. Record audio moments hands-free, get them automatically transcribed and stored on an interactive timeline. Designed for effortless capture of daily life — just speak, and your moments are organized for you.",
    stack: ["React", "TypeScript", "Vite", "Express", "Firebase", "Whisper", "Cloud Run"],
    updated: "2026-04-12",
    next: "Add multi-track categorization, AI-powered tagging, and timeline search.",
  },
  {
    name: "Habla Conmigo",
    url: "https://hablalingo.net",
    category: "life",
    status: "live",
    description: "Personal Spanish speaking practice powered by daily life. Type a thought in Chinese, get a natural Spanish translation with phrase breakdown, grammar patterns, and explanation — then practice speaking with real-time pronunciation feedback.",
    stack: ["Python", "FastAPI", "OpenAI", "Whisper", "SQLite", "Cloud Run"],
    updated: "2026-04-12",
    next: "Add spaced repetition for pinned phrases, roleplay mode, and multi-language support.",
  },
  {
    name: "OtherSide",
    url: "https://otherside.earth",
    category: "research",
    status: "building",
    description: "Multi-language perspective aggregator. Ask any question — it searches across communities in different languages (English, Chinese, Spanish, Arabic, Hindi…), then synthesizes a cited answer in your mother tongue.",
    stack: ["Python", "FastAPI", "OpenAI", "Tavily", "SQLite", "Cloud Run"],
    updated: "2026-04-11",
    next: "Migrate SQLite → Cloud SQL for persistent pins, add synthesis export (PDF), launch to 5 journalist early users.",
  },
  {
    name: "AI Job Builder",
    url: "https://aijobbuilder.net",
    category: "career",
    status: "live",
    description: "Turns a job description + your resume into a personalized project you can actually build. Identifies capability gaps, generates three project options (fast-proof / balanced / standout), guides the build milestone-by-milestone, then writes interview narratives grounded in the real artifacts you shipped.",
    stack: ["Python", "Claude", "FastAPI", "CLI"],
    updated: "2026-04-11",
    next: "Polish the web UI, onboard first batch of job-seeker users, iterate on the interview-prep pack.",
  },
  {
    name: "AI Research Arena",
    url: "https://airesearcharena.org",
    category: "research",
    status: "live",
    description: "Collaborative platform for cracking hard open research problems. Users define a problem, propose hypotheses in parallel, and add structured contributions that each declare what was tested, how, what was found, and what it means. Progress accumulates over time via reputation-weighted voting and first-class evidence tracking.",
    stack: ["Python", "FastAPI", "SQLAlchemy", "Alembic", "HTMX", "Tailwind"],
    updated: "2026-04-11",
    next: "Ship v1.6, recruit research teams for pilot use, expand evidence-collection pipeline.",
  },
];

// ============================================================

const CATEGORIES = {
  life:     { label: "Life",     icon: "\u{1F331}", desc: "Personal growth & daily living" },
  career:   { label: "Career",   icon: "\u{1F4BC}", desc: "Professional tools & job search" },
  research: { label: "Research", icon: "\u{1F52C}", desc: "Knowledge discovery & exploration" },
  tools:    { label: "Tools",    icon: "\u{1F527}", desc: "Utilities & developer tools" },
  hobby:    { label: "Hobby",    icon: "\u{1F3A8}", desc: "Creative & fun side projects" },
};

const CAT_ORDER = ["life", "career", "research", "tools", "hobby"];
const STATUS_ORDER = ["live", "building", "idea", "paused", "archived"];

const ICONS = {
  github: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.38.6.1.82-.26.82-.58v-2.05c-3.34.72-4.04-1.6-4.04-1.6-.55-1.4-1.34-1.77-1.34-1.77-1.1-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.08 1.83 2.82 1.3 3.5.99.11-.77.42-1.3.76-1.6-2.66-.3-5.47-1.33-5.47-5.9 0-1.3.47-2.37 1.23-3.2-.12-.3-.53-1.52.11-3.17 0 0 1-.32 3.3 1.22a11.5 11.5 0 0 1 6 0c2.3-1.54 3.3-1.22 3.3-1.22.66 1.65.24 2.87.12 3.17.77.83 1.23 1.9 1.23 3.2 0 4.58-2.81 5.6-5.49 5.9.43.37.81 1.1.81 2.22v3.3c0 .32.22.69.83.57A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>`,
  book: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
  mail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>`,
  external: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>`,
};

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function renderLinks() {
  const el = document.getElementById("links");
  el.innerHTML = ME.links
    .map(l => `<a href="${l.url}" target="_blank" rel="noopener">${ICONS[l.icon] || ""}${escapeHtml(l.label)}</a>`)
    .join("");
}

let activeCategory = "all";

function renderCatNav() {
  const nav = document.getElementById("catNav");
  const counts = {};
  PROJECTS.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });

  const buttons = [{ key: "all", label: "All", icon: "", count: PROJECTS.length }];
  CAT_ORDER.forEach(cat => {
    if (counts[cat]) {
      const c = CATEGORIES[cat];
      buttons.push({ key: cat, label: c.label, icon: c.icon, count: counts[cat] });
    }
  });

  nav.innerHTML = buttons.map(b =>
    `<div class="cat-nav-btn${activeCategory === b.key ? " on" : ""}" data-cat="${b.key}">` +
      (b.icon ? `<span class="cat-icon">${b.icon}</span>` : "") +
      `${escapeHtml(b.label)}<span class="n">${b.count}</span>` +
    `</div>`
  ).join("");

  nav.querySelectorAll(".cat-nav-btn").forEach(btn => {
    btn.onclick = () => {
      activeCategory = btn.dataset.cat;
      renderCatNav();
      renderSections();
    };
  });
}

function renderCard(p) {
  const stack = (p.stack || []).map(s => `<span>${escapeHtml(s)}</span>`).join("");
  const next = p.next ? `<div class="next">${escapeHtml(p.next)}</div>` : "";
  const link = p.url
    ? `<a class="visit" href="${p.url}" target="_blank" rel="noopener">Visit ${ICONS.external}</a>`
    : `<span class="visit" style="color:var(--muted)">Not live yet</span>`;
  const titleEl = p.url
    ? `<a href="${p.url}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a>`
    : escapeHtml(p.name);
  return `
    <div class="pcard">
      <span class="status ${escapeHtml(p.status)}">${escapeHtml(p.status)}</span>
      <h3>${titleEl}</h3>
      <div class="desc">${escapeHtml(p.description)}</div>
      <div class="stack">${stack}</div>
      ${next}
      <div class="foot">
        <span class="updated">updated ${escapeHtml(p.updated || "\u2014")}</span>
        ${link}
      </div>
    </div>
  `;
}

function renderSections() {
  const container = document.getElementById("sections");
  const filtered = activeCategory === "all"
    ? PROJECTS
    : PROJECTS.filter(p => p.category === activeCategory);

  // Group by category
  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  // Sort projects within each group by status then date
  Object.values(grouped).forEach(list => {
    list.sort((a, b) => {
      const si = STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status);
      if (si !== 0) return si;
      return (b.updated || "").localeCompare(a.updated || "");
    });
  });

  // Render in category order
  let html = "";
  CAT_ORDER.forEach(cat => {
    if (!grouped[cat]) return;
    const c = CATEGORIES[cat] || { label: cat, icon: "", desc: "" };
    const projects = grouped[cat];
    html += `
      <div class="cat-section">
        <div class="cat-header">
          <div class="cat-emoji ${escapeHtml(cat)}">${c.icon}</div>
          <div class="cat-info">
            <h2>${escapeHtml(c.label)}</h2>
            <div class="cat-desc">${escapeHtml(c.desc)}</div>
          </div>
          <div class="cat-count">${projects.length} project${projects.length > 1 ? "s" : ""}</div>
        </div>
        <div class="grid">
          ${projects.map(renderCard).join("")}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

function renderMeta() {
  const latest = PROJECTS.map(p => p.updated).filter(Boolean).sort().pop();
  document.getElementById("lastUpdated").textContent = latest || "\u2014";
  document.title = `${ME.name} \u2014 Projects`;
}

renderLinks();
renderCatNav();
renderSections();
renderMeta();
</script>
</body>
</html>
